<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calendar 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f8f9fa;
    }
    .month {
      margin-bottom: 40px;
    }
    table {
      text-align: center;
    }
    th {
      background: #343a40;
      color: white;
    }
    td {
      height: 60px;
    }
    .today {
      background-color: #ffc107;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container py-4">
  <h1 class="text-center mb-4">📅 Calendar 2026</h1>
  <div id="calendar" class="row"></div>
</div>

<script>
const months = [
  "January","February","March","April","May","June",
  "July","August","September","October","November","December"
];

const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function generateCalendar(year) {
  const container = document.getElementById("calendar");

  months.forEach((month, index) => {
    let firstDay = new Date(year, index, 1).getDay();
    let daysInMonth = new Date(year, index + 1, 0).getDate();

    let html = `
      <div class="col-md-4 month">
        <h5 class="text-center">${month}</h5>
        <table class="table table-bordered">
          <thead>
            <tr>
              ${days.map(day => `<th>${day}</th>`).join("")}
            </tr>
          </thead>
          <tbody>
    `;

    let date = 1;

    for (let i = 0; i < 6; i++) {
      html += "<tr>";

      for (let j = 0; j < 7; j++) {
        if (i === 0 && j < firstDay) {
          html += "<td></td>";
        } else if (date > daysInMonth) {
          html += "<td></td>";
        } else {
          html += `<td>${date}</td>`;
          date++;
        }
      }

      html += "</tr>";
    }

    html += "</tbody></table></div>";

    container.innerHTML += html;
  });
}

generateCalendar(2026);
</script>

</body>
</html>
